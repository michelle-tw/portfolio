<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analytics · Michelle Tran</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#faf8f4;--bg-alt:#f3efe7;--ink:#1c1b19;--ink-soft:#55514b;
    --line:#e3dccf;--gold:#b08d4f;--white:#fff;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;font-weight:300;min-height:100vh}

  /* GATE */
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
  .gate-box{width:100%;max-width:340px;padding:48px 40px;background:var(--white);border:1px solid var(--line);border-radius:12px;text-align:center;box-shadow:0 20px 60px -20px rgba(80,60,20,.12)}
  .gate-box h1{font-family:var(--serif);font-size:1.9rem;margin-bottom:4px}
  .gate-box p{color:var(--ink-soft);font-size:.82rem;margin-bottom:28px}
  .gate-box input{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:.88rem;background:var(--bg);color:var(--ink);margin-bottom:10px;outline:none;transition:.2s}
  .gate-box input:focus{border-color:var(--gold)}
  .gate-box button{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-size:.82rem;font-weight:500;cursor:pointer;letter-spacing:.08em;transition:.2s}
  .gate-box button:hover{background:var(--gold)}
  .gate-err{color:#c0392b;font-size:.78rem;margin-top:10px;display:none}
  .gate-hint{font-size:.75rem;color:var(--ink-soft);margin-top:14px}
  .gate-hint a{color:var(--gold);cursor:pointer}

  /* TOPBAR */
  .topbar{background:var(--white);border-bottom:1px solid var(--line);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:10}
  .brand{font-family:var(--serif);font-size:1.2rem}.brand span{color:var(--gold)}
  .topbar-right{display:flex;align-items:center;gap:14px}
  .ts{font-size:.72rem;color:var(--ink-soft)}
  .btn-sm{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer;color:var(--ink-soft);transition:.2s}
  .btn-sm:hover{border-color:var(--gold);color:var(--gold)}

  /* LAYOUT */
  .dash{display:none}
  .wrap{max-width:1280px;margin:0 auto;padding:0 32px}
  .page-head{padding:36px 0 24px}
  .page-head h2{font-family:var(--serif);font-size:2rem;font-weight:500}
  .page-head p{color:var(--ink-soft);font-size:.82rem;margin-top:2px}

  /* STAT CARDS */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:22px 20px}
  .card .lbl{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .card .val{font-family:var(--serif);font-size:2.1rem;color:var(--gold);font-weight:600;line-height:1}
  .card .sub{font-size:.75rem;color:var(--ink-soft);margin-top:5px}

  /* TABLE */
  .tbl-wrap{background:var(--white);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:40px}
  .tbl-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .tbl-head h3{font-family:var(--serif);font-size:1.05rem;font-weight:500}
  .tbl-inner{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  thead th{background:var(--bg-alt);padding:9px 14px;text-align:left;font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;white-space:nowrap;border-bottom:1px solid var(--line)}
  tbody tr{border-bottom:1px solid var(--line);transition:.12s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--bg)}
  td{padding:11px 14px;vertical-align:middle}
  td.mono{font-family:monospace;font-size:.75rem;color:var(--ink-soft)}
  td.soft{color:var(--ink-soft);font-size:.78rem}
  .bar-wrap{display:flex;align-items:center;gap:6px;white-space:nowrap}
  .bar{width:52px;height:4px;background:var(--line);border-radius:99px;flex-shrink:0}
  .bar-fill{height:100%;background:var(--gold);border-radius:99px}
  .tag{display:inline-block;background:var(--bg-alt);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:.67rem;margin:1px 1px 1px 0;color:var(--ink-soft)}
  .empty{text-align:center;padding:48px;color:var(--ink-soft)}
  .device{margin-right:4px}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h1>Analytics</h1>
    <p>Michelle Tran · Portfolio</p>
    <input type="password" id="passIn" placeholder="Password" onkeydown="if(event.key==='Enter')checkPass()" autofocus />
    <button onclick="checkPass()">Enter</button>
    <div class="gate-err" id="gateErr">Incorrect password</div>
    <div class="gate-hint" id="gateHint" style="display:none">
      Password set. <a onclick="resetPass()">Reset password</a>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="topbar">
    <div class="brand">Michelle<span>.</span> Analytics</div>
    <div class="topbar-right">
      <span class="ts" id="ts"></span>
      <button class="btn-sm" onclick="loadData()">↻ Refresh</button>
      <button class="btn-sm" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="wrap">
    <div class="page-head">
      <h2>Visitor Overview</h2>
      <p>michelle-tw.github.io/portfolio/ · all time</p>
    </div>

    <div class="stat-grid">
      <div class="card"><div class="lbl">Total Visits</div><div class="val" id="sTotal">—</div><div class="sub">all time</div></div>
      <div class="card"><div class="lbl">Top Country</div><div class="val" id="sCountry" style="font-size:1.3rem">—</div><div class="sub" id="sCountrySub"></div></div>
      <div class="card"><div class="lbl">Avg. Time on Page</div><div class="val" id="sTime">—</div><div class="sub">seconds</div></div>
      <div class="card"><div class="lbl">Avg. Scroll Depth</div><div class="val" id="sScroll">—</div><div class="sub">% of page</div></div>
    </div>

    <div class="tbl-wrap">
      <div class="tbl-head">
        <h3>Visit Log</h3>
        <button class="btn-sm" onclick="loadData()">↻ Refresh</button>
      </div>
      <div class="tbl-inner" id="tbl"><div class="empty">Loading…</div></div>
    </div>
  </div>
</div>

<script>
var SB='https://xvcmatgygkraofodjujf.supabase.co';
var SK='sb_publishable_y_h6FDw2LhPOsIqCsS_rDw_4xRF1yis';
var PK='mtw_ph', AK='mtw_as';

async function sha256(s){
  var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}

async function checkPass(){
  var v=document.getElementById('passIn').value.trim();
  if(!v)return;
  var stored=localStorage.getItem(PK);
  var h=await sha256(v);
  if(!stored){
    localStorage.setItem(PK,h);
    document.getElementById('gateHint').style.display='';
    enterDash();
  } else if(h===stored){
    enterDash();
  } else {
    document.getElementById('gateErr').style.display='';
    document.getElementById('passIn').value='';
    document.getElementById('passIn').focus();
  }
}

function resetPass(){
  localStorage.removeItem(PK);
  sessionStorage.removeItem(AK);
  location.reload();
}

function enterDash(){
  sessionStorage.setItem(AK,'1');
  document.getElementById('gate').style.display='none';
  document.getElementById('dash').style.display='';
  loadData();
}

function logout(){
  sessionStorage.removeItem(AK);
  location.reload();
}

if(sessionStorage.getItem(AK)){
  document.getElementById('gate').style.display='none';
  document.getElementById('dash').style.display='';
  loadData();
}

function loadData(){
  document.getElementById('ts').textContent='Loading…';
  fetch(SB+'/rest/v1/visits?select=*&order=created_at.desc&limit=500',{
    headers:{'apikey':SK,'Authorization':'Bearer '+SK}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!Array.isArray(rows)){
      document.getElementById('tbl').innerHTML='<div class="empty">Error: '+JSON.stringify(rows)+'</div>';
      return;
    }
    renderStats(rows);
    renderTable(rows);
    document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();
  }).catch(function(e){
    document.getElementById('tbl').innerHTML='<div class="empty">Failed to load — check RLS policies in Supabase.</div>';
  });
}

function renderStats(rows){
  document.getElementById('sTotal').textContent=rows.length.toLocaleString();
  var cc={};
  rows.forEach(function(r){if(r.country)cc[r.country]=(cc[r.country]||0)+1;});
  var top=Object.entries(cc).sort(function(a,b){return b[1]-a[1];})[0];
  if(top){document.getElementById('sCountry').textContent=top[0];document.getElementById('sCountrySub').textContent=top[1]+' visits';}
  var times=rows.filter(function(r){return r.time_on_page>0;}).map(function(r){return r.time_on_page;});
  document.getElementById('sTime').textContent=times.length?Math.round(times.reduce(function(a,b){return a+b;},0)/times.length)+'s':'—';
  var scrolls=rows.filter(function(r){return r.scroll_depth>0;}).map(function(r){return r.scroll_depth;});
  document.getElementById('sScroll').textContent=scrolls.length?Math.round(scrolls.reduce(function(a,b){return a+b;},0)/scrolls.length)+'%':'—';
}

function renderTable(rows){
  if(!rows.length){document.getElementById('tbl').innerHTML='<div class="empty">No visits yet. Come back after some traffic!</div>';return;}
  var h='<table><thead><tr><th>Time (local)</th><th>Device · IP</th><th>Location</th><th>From</th><th>Scroll</th><th>Duration</th><th>Sections Seen</th></tr></thead><tbody>';
  rows.forEach(function(r){
    var d=new Date(r.created_at);
    var ts=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    var loc=[r.city,r.country].filter(Boolean).join(', ')||'—';
    var ref=r.referrer&&r.referrer!=='direct'?('<a href="'+r.referrer+'" target="_blank" style="color:var(--gold)">'+r.referrer.replace(/^https?:\/\//,'').substring(0,32)+'</a>'):'direct';
    var pct=Math.min(r.scroll_depth||0,100);
    var scroll='<div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+pct+'%</div>';
    var dur=r.time_on_page?r.time_on_page+'s':'—';
    var tags=(r.sections_viewed||[]).map(function(s){return '<span class="tag">'+s+'</span>';}).join('');
    var dev=r.user_agent?(r.user_agent.match(/Mobile|Android|iPhone|iPad/i)?'📱':'💻'):'';
    h+='<tr>'
      +'<td class="soft">'+ts+'</td>'
      +'<td class="mono">'+dev+' '+(r.ip||'—')+'</td>'
      +'<td>'+loc+'</td>'
      +'<td class="soft">'+ref+'</td>'
      +'<td>'+scroll+'</td>'
      +'<td class="soft">'+dur+'</td>'
      +'<td>'+(tags||'—')+'</td>'
      +'</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('tbl').innerHTML=h;
}
</script>
</body>
</html>
