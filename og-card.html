<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(125deg,#faf8f4 0%,#f3efe7 100%);
    color:#1c1b19;display:flex;align-items:center;
    position:relative;
  }
  .ring{position:absolute;border:1px solid rgba(176,141,79,.18);border-radius:50%}
  .r1{width:520px;height:520px;right:-160px;top:-150px}
  .r2{width:340px;height:340px;right:60px;bottom:-150px}
  .left{flex:1;padding:0 0 0 80px;position:relative;z-index:2}
  .eyebrow{font-size:18px;letter-spacing:6px;text-transform:uppercase;color:#b08d4f;font-weight:600;margin-bottom:26px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:88px;line-height:1;letter-spacing:1px}
  .zh{font-family:'Cormorant Garamond',serif;font-size:38px;color:#55514b;letter-spacing:8px;margin-top:12px}
  .role{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:30px;color:#55514b;margin:26px 0 30px;max-width:15em;line-height:1.3}
  .tags{display:flex;gap:12px;flex-wrap:wrap;max-width:560px}
  .tag{font-size:16px;letter-spacing:.5px;padding:8px 18px;border:1px solid #e3dccf;border-radius:99px;background:#fff;color:#55514b}
  .right{width:430px;height:100%;position:relative}
  .photo{position:absolute;width:330px;height:430px;right:70px;top:100px;border-radius:8px;
    object-fit:cover;object-position:center 18%;box-shadow:0 40px 80px -30px rgba(80,60,20,.5);border:6px solid #fff}
  .gold-line{position:absolute;left:80px;bottom:60px;width:90px;height:3px;background:#b08d4f}
</style>
</head>
<body>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="left">
    <div class="eyebrow">International Marketing · Consumer Insight</div>
    <h1>Michelle Tran</h1>
    <div class="zh">陳氏清花</div>
    <div class="role">Turning consumer insight into brands that grow.</div>
    <div class="tags">
      <span class="tag">NCKU IMBA</span>
      <span class="tag">Trilingual 中·EN·VI</span>
      <span class="tag">L'Oréal Brandstorm</span>
      <span class="tag">Hult Prize</span>
    </div>
    <div class="gold-line"></div>
  </div>
  <div class="right">
    <img class="photo" src="portrait.jpg" alt="Michelle Tran" />
  </div>
</body>
</html>
